<section class="relative h-[60vh] md:h-[80vh] w-full flex items-center justify-center text-center overflow-hidden bg-neutral-950">

  @for (slide of slides; track slide.image; let i = $index) {
    <div 
      class="absolute inset-0 w-full h-full bg-cover bg-top transition-opacity duration-1000 ease-in-out"
      [style.background-image]="'url(' + slide.image + ')'"
      [class.opacity-100]="slideAtual === i"
      [class.opacity-0]="slideAtual !== i"
      [class.z-0]="slideAtual !== i"
      [class.z-10]="slideAtual === i">
    </div>
  }

  <div class="absolute inset-0 bg-neutral-950/60 z-20"></div>

  <div class="relative z-30 flex flex-col items-center gap-6 px-12">
    <h2 class="text-4xl md:text-6xl font-black text-white tracking-widest uppercase drop-shadow-lg transition-all duration-700">
      {{slides[slideAtual].title}}
    </h2>
    
    <button (click)="rolar('colecao')" class="border-2 border-amber-500 text-amber-500 px-8 py-3 text-sm font-bold tracking-widest hover:bg-amber-500 hover:text-neutral-950 transition-colors uppercase">
      Ver Coleção
    </button>
  </div>

  <button 
    (click)="slideAnterior()" 
    class="absolute left-0 md:left-6 z-40 text-white/50 hover:text-white transition-colors cursor-pointer p-2 md:p-4">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8 md:w-12 md:h-12">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
    </svg>
  </button>

  <button 
    (click)="proximoSlide()" 
    class="absolute right-2 md:right-6 z-40 text-white/50 hover:text-white transition-colors cursor-pointer p-2 md:p-4">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8 md:w-12 md:h-12">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
    </svg>
  </button>

</section>
