<section class="py-12">
  <div class="mb-8 border-b border-zinc-200 pb-4">
    <h2 class="text-3xl font-black text-zinc-800 uppercase tracking-wide">Acervo</h2>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
    
    @for (album of albums(); track album.id) {
      
      <app-album-card [album]="album"></app-album-card>
      
    } @empty {
      <p class="text-zinc-500 col-span-full text-center py-10">Nenhum disco encontrado.</p>
    }

  </div>
</section>
